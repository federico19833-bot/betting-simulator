<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betting Simulator - Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f172a; color:#e2e8f0; padding:20px; }
h1 { font-size:24px; margin-bottom:5px; }
.sub { color:#94a3b8; font-size:14px; margin-bottom:20px; }
.stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
.stat { background:#1e293b; border-radius:10px; padding:14px; text-align:center; }
.stat .val { font-size:22px; font-weight:bold; }
.stat .lbl { font-size:12px; color:#94a3b8; margin-top:2px; }
.green { color:#22c55e; } .red { color:#ef4444; } .yellow { color:#f59e0b; } .blue { color:#3b82f6; }
.chart-wrap { background:#1e293b; border-radius:10px; padding:16px; margin-bottom:20px; }
.chart-wrap canvas { max-height:350px; }
table { width:100%; border-collapse:collapse; font-size:13px; background:#1e293b; border-radius:10px; overflow:hidden; }
th { background:#334155; padding:10px 8px; text-align:left; font-weight:600; }
td { padding:8px; border-bottom:1px solid #334155; }
tr:hover { background:#1a2744; }
.footer { text-align:center; color:#64748b; font-size:12px; margin-top:20px; }
</style>
</head>
<body>
<h1>Betting Simulator</h1>
<div class="sub">Strategia Over 0.5 | Range 1.03-1.10 | Soglia 15.000€ | Aggiornato: 14/05/2026 10:06</div>

<div class="stats">
    <div class="stat"><div class="val blue">0</div><div class="lbl">Giocate totali</div></div>
    <div class="stat"><div class="val green">0</div><div class="lbl">Vinte</div></div>
    <div class="stat"><div class="val red">0</div><div class="lbl">Perse</div></div>
    <div class="stat"><div class="val yellow">0</div><div class="lbl">In corso</div></div>
    <div class="stat"><div class="val red">0%</div><div class="lbl">Win Rate</div></div>
    <div class="stat"><div class="val green">+0.00€</div><div class="lbl">Profitto netto</div></div>
    <div class="stat"><div class="val green">0%</div><div class="lbl">ROI</div></div>
    <div class="stat"><div class="val blue">1000.00€</div><div class="lbl">Capitale finale</div></div>
</div>

<div class="chart-wrap">
<canvas id="equityChart"></canvas>
</div>

<div style="overflow-x:auto">
<table>
<thead><tr>
<th>ID</th><th>Data</th><th>Match</th><th>Campionato</th><th>Quota</th><th>Volume</th><th>Esito</th><th>Profitto</th>
</tr></thead>
<tbody></tbody>
</table>
</div>

<div class="footer">Generato automaticamente ogni giorno</div>

<script>
new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: 'Equity',
                data: [],
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59,130,246,0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 3,
                pointHoverRadius: 6,
                borderWidth: 2
            },
            {
                label: 'Vinte',
                data: [],
                backgroundColor: '#22c55e',
                borderColor: '#22c55e',
                pointRadius: 5,
                pointStyle: 'triangle',
                showLine: false
            },
            {
                label: 'Perse',
                data: [],
                backgroundColor: '#ef4444',
                borderColor: '#ef4444',
                pointRadius: 5,
                pointStyle: 'rectRot',
                showLine: false
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { labels: { color: '#94a3b8' } },
            title: { display: true, text: 'Andamento Capitale', color: '#e2e8f0', font: { size: 16 } }
        },
        scales: {
            x: { ticks: { color: '#94a3b8', maxTicksLimit: 20 }, grid: { color: '#334155' } },
            y: { ticks: { color: '#94a3b8', callback: v => v + '€' }, grid: { color: '#334155' } }
        }
    }
});
</script>
</body>
</html>
